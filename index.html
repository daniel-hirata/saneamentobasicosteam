<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jacquard+24&display=swap');
        *{
            padding: 0;
            box-sizing: border-box;
            background-attachment: fixed;

        }
        body{
            background-image: url(./telainicial.jfif);
            background-size: cover;

        }
        h1{
            font-family: "Jacquard 24", system-ui;
            font-size: clamp(3rem, 10vw, 5.5rem);
            line-height: 1;
            color: #0a642b;
            margin-bottom: 2rem;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
            background-color: antiquewhite;
            border: 3px  green ridge;

        }
        div{
            background: rgba(255, 255, 255, 0.39);
            backdrop-filter: blur(7px);
            -webkit-backdrop-filter: blur(7px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            padding: 4rem 2rem;
            max-width: 100%;
            width: 100%;
            text-align: center;
            transition: all 0.3s ease;
        }
        a{
           display: inline-block;
            background: #16a34a;
            color: white;
            padding: 1rem 4rem;
            border-radius: 9999px;
            font-size: 1.5rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 15px -3px rgba(22, 163, 74, 0.4);
        }
        .btn:hover{
            transform: scale(1.05) translateY(-5px);
            background: #15803d;
            box-shadow: 0 20px 25px -5px rgba(22, 163, 74, 0.5);
        }
    </style>
</head>
<body>
    <div>
        <h1>Do sujo ao limpo</h1>
    <a class="btn" href="i.html">começar</a>
    </div>
    
</body>
</html>
